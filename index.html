<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SG Enterprises</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
header { background:#0d1b2a; color:white; padding:15px; text-align:center; }

.search-box { padding:10px; text-align:center; }
.search-box input {
    width:90%; padding:10px; border-radius:5px; border:1px solid gray;
}

.products {
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
}

.card {
    background:blue;
    width:230px;
    margin:10px;
    padding:15px;
    border-radius:10px;
    text-align:center;
    box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.btn {
    background:#00d084;
    color:white;
    padding:10px;
    border:none;
    border-radius:5px;
    margin-top:10px;
}
</style>
</head>

<body>

<header>
<h2>SG Enterprises</h2>
<p>Cycle Spare Parts Wholesale</p>
</header>

<div class="search-box">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="products" id="productList"></div>

<script>

let products = [];

async function loadCSV() {
    const res = await fetch('stock.csv');
    const data = await res.text();

    const rows = data.split('\n').slice(1); // skip header

    products = rows.map(row => row.split(',')[0]); // first column = product name

    display(products);
}

function display(list){
    let html = "";
    list.forEach(p => {
        if(!p) return;
        html += `
        <div class="card">
            <h3>${p}</h3>
            <button class="btn" onclick="order('${p}')">
                Order on WhatsApp
            </button>
        </div>`;
    });
    document.getElementById("productList").innerHTML = html;
}

function searchProduct(){
    let input = document.getElementById("search").value.toLowerCase();
    let filtered = products.filter(p => p.toLowerCase().includes(input));
    display(filtered);
}

function order(product){
    let phone = "919695781319";
    let msg = "Hello, I want to order: " + product;
    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`);
}

loadCSV();

</script>

</body>
</html>
